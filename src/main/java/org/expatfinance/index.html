<!DOCTYPE html>
<html>
<head><title>Firebase Test</title></head>
<body>
<button onclick="signIn()">Sign in with Google</button>
<pre id="token" style="word-break:break-all;font-size:12px"></pre>
<pre id="result" style="color:green"></pre>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "api-key",
        authDomain: "expactfinance-54d5f.firebaseapp.com",
        projectId: "expactfinance-54d5f",
        storageBucket: "expactfinance-54d5f.firebasestorage.app",
        messagingSenderId: "1012287927498",
        appId: "1:1012287927498:web:69bd873c25a20da899f033",
        measurementId: "G-RTHP09GLYK"
    })


    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.signIn = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const token = await result.user.getIdToken();

            document.getElementById("token").innerText = "TOKEN:\n" + token;

            // Immediately test against your backend
            const res = await fetch("http://localhost:8080/auth/me", {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await res.json();
            document.getElementById("result").innerText = "BACKEND RESPONSE:\n" + JSON.stringify(data, null, 2);

        } catch (e) {
            document.getElementById("result").innerText = "ERROR: " + e.message;
            document.getElementById("result").style.color = "red";
        }
    }
</script>
</body>
</html>
